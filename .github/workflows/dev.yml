name: Dev Build

on:
  push:
    branches:
      - lovable-dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (dev)
        run: npm run build:dev
        env:
          NODE_ENV: development
